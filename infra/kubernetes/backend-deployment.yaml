apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-api
  namespace: ai-ops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: incident-api
  template:
    metadata:
      labels:
        app: incident-api
    spec:
      containers:
      - name: api
        image: your-registry/incident-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: url
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: incident-api-svc
  namespace: ai-ops
spec:
  selector:
    app: incident-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
